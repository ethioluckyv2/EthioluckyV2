<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ethiolucky Admin</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="page">

    <h1 class="logo">
        🎡 Ethiolucky Admin
    </h1>

    <button onclick="logout()">
        Logout
    </button>

    <div class="card">

        <h2>Players</h2>

        <div class="row">

            <input
                id="playerName"
                type="text"
                placeholder="Player name">

            <input
                id="playerColor"
                type="color"
                value="#ff0000">

            <button onclick="addPlayer()">
                Add Player
            </button>

        </div>

        <div class="playerHeader">

             <h3>
                 Players:
                 <span id="playerCount">0</span>
             </h3>


             <button onclick="clearPlayers()">
                 Clear All
             </button>

         </div>

         
        <div id="playersList"></div>

    </div>

    <div class="card">

        <h2>Wheel Settings</h2>

        <label>Spin Duration (seconds)</label>

        <input
            id="spinDuration"
            type="number"
            value="60">

        <label>Minimum Speed</label>

        <input
            id="minSpeed"
            type="number"
            value="8">

        <label>Maximum Speed</label>

        <input
            id="maxSpeed"
            type="number"
            value="25">

        <label>Background Color</label>

        <input
            id="bgColor"
            type="color"
            value="#ffffff">

        <button onclick="saveSettings()">
            Save Settings
        </button>

    </div>

    <div class="card">

        <h2>Spin</h2>

        <button class="spinButton" onclick="startSpin()">
            🎡 START SPIN
        </button>

    </div>

    <div class="card">

        <h2>
            👥 Online Viewers:
            <span id="viewerCount">
                0
            </span>
        </h2>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="js/auth.js"></script>

<script>
checkAuth("admin");
</script>

<script src="js/admin.js"></script>


</body>

</html>
