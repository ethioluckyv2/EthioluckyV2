<!DOCTYPE html>
<html>
<head>
    <title>Ethiolucky Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-box">

    <h1>Ethiolucky Admin</h1>

    <input 
        id="username" 
        type="text" 
        placeholder="Username"
    >

    <input 
        id="password" 
        type="password" 
        placeholder="Password"
    >

    <button onclick="login()">
        Login
    </button>

</div>


<script src="admin.js"></script>

</body>
</html>
